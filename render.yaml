databases:
  - name: trino-db
    plan: free
    databaseName: trino
    user: trino

services:
  - type: web
    name: trino
    runtime: python
    plan: free
    branch: main
    buildCommand: "pip install poetry==2.4.1 && poetry install --only main --no-root && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn trino.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trino-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: POETRY_VIRTUALENVS_CREATE
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
