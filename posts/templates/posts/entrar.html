{% extends "posts/base.html" %}

{% block title %}Entrar — Trino{% endblock %}

{% block content %}
<div class="card">
    <h1 class="form-title">Entrar</h1>
    {% if erro %}<p class="erro">{{ erro }}</p>{% endif %}
    <form method="post" action="/entrar/">
        {% csrf_token %}
        <input class="input" type="text" name="username" placeholder="Nome de usuário" required>
        <input class="input" type="password" name="password" placeholder="Senha" required>
        <button class="btn btn-full" type="submit">Entrar</button>
    </form>
    <p class="form-foot">Não tem conta? <a href="/cadastro/">Cadastrar</a></p>
</div>
{% endblock %}
